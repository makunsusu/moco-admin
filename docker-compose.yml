version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: moco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: moco_admin
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --max_connections=300
    ports:
      - "3306:3306"
    volumes:
      - moco_mysql_data:/var/lib/mysql
      - ./sql/moco_20260320.sql:/docker-entrypoint-initdb.d/01-moco.sql:ro
      - ./sql/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: moco-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - moco_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  moco_mysql_data:
  moco_redis_data:
